<div class="page-container">
  <header class="page-header">
    <h1>{{ pageTitle }}</h1>
  </header>

  <div class="dashboard-container">

    <section class="form-section">
      <div class="form-container">
        <div class="form-header">
          <h2>{{ editingId ? 'Update KPI Row' : 'Create KPI Row' }}</h2>
        </div>

        <form class="kpi-form" (ngSubmit)="submitForm()">
          <div class="form-row">
            <div class="form-group">
              <label for="kpi">Network Engineer KPI</label>
              <input id="kpi" type="text" [(ngModel)]="form.networkEngineerKpi" name="kpi" placeholder="Network Engineer KPI" required />
            </div>

            <div class="form-group">
              <label for="division">Division</label>
              <input id="division" type="text" [(ngModel)]="form.division" name="division" placeholder="Division" />
            </div>

            <div class="form-group">
              <label for="section">Section</label>
              <input id="section" type="text" [(ngModel)]="form.section" name="section" placeholder="Section" />
            </div>

            <div class="form-group">
              <label for="kpiPercent">KPI (%)</label>
              <input id="kpiPercent" type="number" [(ngModel)]="form.kpiPercent" name="kpiPercent" placeholder="KPI (%)" required />
            </div>
          </div>

          <div class="form-actions">
            <button class="btn-submit" type="submit" [disabled]="saving">{{ editingId ? 'Update' : 'Add' }}</button>
            <button type="button" class="btn-cancel" *ngIf="editingId" (click)="closeForm()">Cancel</button>
          </div>
        </form>
      </div>
    </section>

    <section class="table-section">
      <div class="state" *ngIf="!data.length">No KPI entries yet.</div>

      <div class="table-responsive" *ngIf="data.length">
        <table class="kpi-table">
          <thead>
            <tr>
              <th>Network Engineer KPI</th>
              <th>Division</th>
              <th>Section</th>
              <th>KPI (%)</th>
              <th class="actions-col">Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let row of data; trackBy: trackRow">
              <td>{{ row.networkEngineerKpi }}</td>
              <td>{{ row.division }}</td>
              <td>{{ row.section }}</td>
              <td>{{ row.kpiPercent }}</td>
              <td class="actions-col">
                <div class="action-buttons">
                  <button type="button" class="btn-edit" (click)="editRow(row)">Edit</button>
                  <button type="button" class="btn-delete" (click)="deleteRow(row.id)">Delete</button>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

  </div>
</div>
