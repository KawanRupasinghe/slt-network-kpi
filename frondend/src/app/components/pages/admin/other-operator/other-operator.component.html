<div class="page-container">
  <div class="page-header">
    <h1>{{ pageTitle }}</h1>
  </div>

  <div class="dashboard-container">
    <div class="form-container">
      <div class="form-header">
        <div>
          <h2>{{ editingId ? 'Update KPI' : 'Add KPI' }}</h2>
          <p class="form-sub">Manage Other Operator KPI records</p>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn-submit" form="other-operator-form" [disabled]="form.invalid || saving">
            {{ editingId ? 'Update' : 'Add' }}
          </button>
          <button type="button" class="btn-cancel" *ngIf="editingId" (click)="onCancelEdit()" [disabled]="saving">
            Cancel
          </button>
        </div>
      </div>

      <form id="other-operator-form" class="kpi-form" [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="form-row">
          <div class="form-group">
            <label>Responsibility</label>
            <input type="text" formControlName="networkEngineerKpi" placeholder="Responsibility" />
          </div>

          <div class="form-group">
            <label>Frequency</label>
            <input type="text" formControlName="division" placeholder="Frequency" />
          </div>

          <div class="form-group">
            <label>Weightage</label>
            <input type="text" formControlName="section" placeholder="Weightage" />
          </div>

          <div class="form-group">
            <label>KPI</label>
            <input type="number" step="any" formControlName="kpiPercent" placeholder="KPI" />
          </div>
        </div>


      </form>
    </div>

    <div class="table-wrapper">
      <div class="table-responsive">
        <table class="kpi-table">
          <thead>
            <tr>
              <th>Responsibility</th>
              <th>Frequency</th>
              <th>Weightage</th>
              <th>KPI</th>
              <th class="actions-col">Actions</th>
            </tr>
          </thead>

          <tbody>
            <tr *ngIf="records.length===0">
              <td colspan="5" class="no-data">No KPI data available</td>
            </tr>

            <tr *ngFor="let record of records">
              <td>{{ record.networkEngineerKpi }}</td>
              <td>{{ record.division }}</td>
              <td>{{ record.section }}</td>
              <td>{{ record.kpiPercent }}</td>
              <td class="actions-col">
                <div class="action-buttons">
                  <button type="button" class="btn-edit" (click)="onEdit(record)">Edit</button>
                  <button type="button" class="btn-delete" (click)="onDelete(record.id)">Delete</button>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
