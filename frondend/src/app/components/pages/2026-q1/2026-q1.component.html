<div class="final-tables-container">
  <header class="current-month-header">
    <div class="header-left">
      <ng-container *ngIf="activeView === 'monthly'">
        <h1>2026 Q1 KPI Details</h1>
        <p class="subtitle">
          Detailed KPI metrics for {{ currentMonth }} {{ currentYear }} across operational areas
        </p>
      </ng-container>

      <ng-container *ngIf="activeView === 'summary'">
        <h1>2026 Q1 KPI Summary</h1>
        <p class="subtitle">
          Summary of KPI performance across all operational areas for Q1 2026.
        </p>
      </ng-container>

      <div class="view-toggle-bar" role="tablist" aria-label="2026 Q1 view tabs">
        <button type="button" class="view-toggle-btn" [class.active]="activeView === 'monthly'" (click)="setActiveView('monthly')">
          Monthly View
        </button>
        <button type="button" class="view-toggle-btn" [class.active]="activeView === 'summary'" (click)="setActiveView('summary')">
          Summary View
        </button>
      </div>
    </div>

    <div class="header-filters" *ngIf="activeView === 'monthly'">
      <div class="filter-group">
        <label for="month-select">Month:</label>
        <select id="month-select" class="filter-select" [(ngModel)]="selectedMonth"
          (ngModelChange)="onMonthChange($event)">
          <option *ngFor="let month of monthOptions" [ngValue]="month.value">
            {{ month.label }}
          </option>
        </select>
      </div>
      <div class="filter-group">
        <label for="year-select">Year:</label>
        <select id="year-select" class="filter-select" [(ngModel)]="selectedYear"
          (ngModelChange)="onYearChange($event)">
          <option *ngFor="let year of yearOptions" [ngValue]="year">
            {{ year }}
          </option>
        </select>
      </div>
    </div>

    <div class="header-right">
      <span class="count-pill">{{ engineersCount }} NEs</span>
      <button class="export-btn" type="button" (click)="exportToExcel()">
        Export to Excel
      </button>
    </div>
  </header>

  <ng-container *ngIf="activeView === 'monthly'">
    <div class="no-data-banner" *ngIf="!loading && noOverallResults">
      No data for the selected month and year.
    </div>

    <div class="excel-view-container" *ngIf="!loading && isExcelView">
      <div class="excel-table-wrapper" [innerHTML]="excelHtmlContent"></div>
    </div>
  </ng-container>

  <ng-container *ngIf="activeView === 'summary'">
    <div class="no-data-banner" style="margin-top: 2rem;">
      Summary View (Coming Soon)
    </div>
  </ng-container>
</div>
