<div class="final-tables-container">
  <header class="current-month-header">
    <div class="header-left">
      <h1>2026 Q1 KPI Details</h1>
      <p class="subtitle">
        Detailed KPI metrics for {{ currentMonth }} {{ currentYear }} across operational areas
      </p>
    </div>

    <div class="header-filters">
      <div class="filter-group">
        <label for="month-select">Month:</label>
        <select id="month-select" class="filter-select" [(ngModel)]="selectedMonth" (ngModelChange)="onMonthChange($event)">
          <option *ngFor="let month of monthOptions" [ngValue]="month.value">
            {{ month.label }}
          </option>
        </select>
      </div>
      <div class="filter-group">
        <label for="year-select">Year:</label>
        <select id="year-select" class="filter-select" [(ngModel)]="selectedYear" (ngModelChange)="onYearChange($event)">
          <option *ngFor="let year of yearOptions" [ngValue]="year">
            {{ year }}
          </option>
        </select>
      </div>
    </div>

    <div class="header-right">
      <span class="count-pill">{{ engineersCount }} NEs</span>
      <button class="export-btn" type="button">
        Export to Excel
      </button>
    </div>
  </header>
</div>
